name: "Bug Report"
description: "Reporte um problema encontrado no sistema"
title: "[BUG]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar um bug. Preencha as informações abaixo.

  - type: textarea
    id: descricao
    attributes:
      label: Descrição do Problema
      description: Explique o problema encontrado.
      placeholder: Descreva o bug...
    validations:
      required: true

  - type: textarea
    id: passos
    attributes:
      label: Passos para Reproduzir
      description: Liste os passos para reproduzir o problema.
      placeholder: |
        1. Passo 1
        2. Passo 2
        3. Passo 3
    validations:
      required: true

  - type: textarea
    id: esperado
    attributes:
      label: Comportamento Esperado
      description: Descreva o comportamento esperado do sistema.
    validations:
      required: true

  - type: textarea
    id: atual
    attributes:
      label: Comportamento Atual
      description: Explique o que realmente acontece.
    validations:
      required: true

  - type: textarea
    id: evidencias
    attributes:
      label: Evidências
      description: Adicione prints, logs ou erros.
      placeholder: Cole aqui logs ou imagens.

  - type: checkboxes
    id: criterios
    attributes:
      label: Critérios de Aceitação
      options:
        - label: Bug corrigido
        - label: Testado em ambiente de desenvolvimento
        - label: Não gera regressões