name: "Feature Request"
description: "Sugestão ou solicitação de nova funcionalidade"
title: "[FEATURE]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Use este template para sugerir ou solicitar uma nova funcionalidade.

  - type: textarea
    id: contexto
    attributes:
      label: Contexto
      description: Descreva o problema ou oportunidade que motivou a criação desta funcionalidade.
      placeholder: Explique o contexto da nova feature...
    validations:
      required: true

  - type: textarea
    id: objetivo
    attributes:
      label: Objetivo
      description: Explique claramente o que deve ser desenvolvido ou implementado.
      placeholder: O que essa funcionalidade deve fazer?
    validations:
      required: true

  - type: textarea
    id: escopo
    attributes:
      label: Escopo
      description: Liste as funcionalidades incluídas nesta implementação.
      placeholder: |
        - Funcionalidade 1
        - Funcionalidade 2
        - Funcionalidade 3

  - type: textarea
    id: requisitos_tecnicos
    attributes:
      label: Requisitos Técnicos
      description: Liste requisitos técnicos ou dependências necessárias.
      placeholder: |
        Exemplo:
        - Integração com API
        - Uso de banco de dados
        - Alterações na interface

  - type: textarea
    id: referencias
    attributes:
      label: Referências
      description: Links, projetos ou documentações relacionadas.
      placeholder: |
        https://link-exemplo.com
        https://documentacao-exemplo.com

  - type: checkboxes
    id: criterios
    attributes:
      label: Critérios de Aceitação
      options:
        - label: Critério 1
        - label: Critério 2
        - label: Critério 3